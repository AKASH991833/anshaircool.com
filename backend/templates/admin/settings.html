{% extends "admin/base.html" %}
{% block title %}Site Settings - Ansh Air Cool{% endblock %}
{% block content %}
<div class="header">
    <div><h1>Site Settings</h1><p style="color: #6b7280;">Manage your website's global information</p></div>
</div>

<div class="form-card">
    <form method="POST">
        <h3 style="margin-bottom: 1.5rem; color: #374151;">Business Information</h3>

        <div class="form-group">
            <label>Site / Business Name</label>
            <input type="text" name="site_name" value="{{ settings.site_name if settings else 'ANSH AIR COOL' }}" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" value="{{ settings.phone if settings else '' }}" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ settings.email if settings else '' }}" required>
            </div>
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea name="address" rows="2">{{ settings.address if settings else '' }}</textarea>
        </div>

        <div class="form-group">
            <label>WhatsApp Number (without +, e.g. 919876543210)</label>
            <input type="text" name="whatsapp_number" value="{{ settings.whatsapp_number if settings else '' }}" required>
        </div>

        <div class="form-group">
            <label>Tagline</label>
            <input type="text" name="tagline" value="{{ settings.tagline if settings else '' }}" placeholder="Premium Air Conditioning Solutions">
        </div>

        <div class="form-group">
            <label>Description (for footer)</label>
            <textarea name="description" rows="3">{{ settings.description if settings else '' }}</textarea>
        </div>

        <hr style="margin: 2rem 0; border: none; border-top: 1px solid #e5e7eb;">

        <h3 style="margin-bottom: 1.5rem; color: #374151;">Statistics (Hero & About)</h3>

        <div class="form-row">
            <div class="form-group">
                <label>Years of Experience</label>
                <input type="number" name="years_experience" value="{{ settings.years_experience if settings else 15 }}">
            </div>
            <div class="form-group">
                <label>Customers Served</label>
                <input type="number" name="customers_served" value="{{ settings.customers_served if settings else 50000 }}">
            </div>
        </div>

        <div class="form-group">
            <label>Satisfaction Rate (%)</label>
            <input type="number" name="satisfaction_rate" value="{{ settings.satisfaction_rate if settings else 99 }}" min="0" max="100">
        </div>

        <button type="submit" class="btn"><i class="fas fa-save"></i> Save Settings</button>
        <a href="/admin/dashboard" class="btn btn-secondary" style="margin-left: 1rem;"><i class="fas fa-times"></i> Cancel</a>
    </form>
</div>
{% endblock %}
