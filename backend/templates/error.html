<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Ansh Air Cool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-container {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        .error-container i { font-size: 4rem; color: #ef4444; margin-bottom: 1rem; }
        .error-container h1 { font-size: 2rem; margin-bottom: 1rem; color: #111; }
        .error-container p { color: #6b7280; margin-bottom: 2rem; }
        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            background: #06b6d4;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: transform 0.3s;
        }
        .btn:hover { transform: translateY(-2px); }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
</head>
<body>
    <div class="error-container">
        <i class="fas fa-exclamation-triangle"></i>
        <h1>Oops! Something went wrong</h1>
        <p>{{ error if error else 'An unexpected error occurred.' }}</p>
        <a href="/" class="btn">
            <i class="fas fa-home"></i> Go Home
        </a>
    </div>
</body>
</html>
