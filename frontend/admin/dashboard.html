<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Ansh Air Cool</title>
    <link rel="stylesheet" href="../assets/css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-wind"></i>
            <h2>ANSH ADMIN</h2>
        </div>
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-link active">
                <i class="fas fa-tachometer-alt"></i> Dashboard
            </a>
            <a href="products.html" class="nav-link">
                <i class="fas fa-box"></i> Products
            </a>
            <a href="services.html" class="nav-link">
                <i class="fas fa-tools"></i> Services
            </a>
            <a href="orders.html" class="nav-link">
                <i class="fas fa-shopping-cart"></i> Orders
            </a>
            <a href="contacts.html" class="nav-link">
                <i class="fas fa-envelope"></i> Messages
                <span id="msgBadge" style="margin-left:auto;background:#ef4444;color:white;font-size:0.7rem;padding:0.15rem 0.5rem;border-radius:50px;display:none;"></span>
            </a>
            <a href="settings.html" class="nav-link">
                <i class="fas fa-cog"></i> Settings
            </a>
            <a href="../../index.html" class="nav-link" target="_blank">
                <i class="fas fa-external-link-alt"></i> View Website
            </a>
            <a href="#" class="nav-link logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main">
        <header class="topbar">
            <h1>Dashboard</h1>
            <div class="user-info">
                <span>Welcome, <strong id="adminName">Admin</strong></span>
            </div>
        </header>

        <div class="stats">
            <div class="stat-card blue">
                <div class="stat-icon"><i class="fas fa-box"></i></div>
                <div class="stat-info">
                    <h3 id="productCount">0</h3>
                    <p>Products</p>
                </div>
            </div>
            <div class="stat-card green">
                <div class="stat-icon"><i class="fas fa-tools"></i></div>
                <div class="stat-info">
                    <h3 id="serviceCount">0</h3>
                    <p>Services</p>
                </div>
            </div>
            <div class="stat-card yellow">
                <div class="stat-icon"><i class="fas fa-shopping-cart"></i></div>
                <div class="stat-info">
                    <h3 id="orderCount">0</h3>
                    <p>Orders</p>
                </div>
            </div>
            <div class="stat-card yellow">
                <div class="stat-icon"><i class="fas fa-envelope"></i></div>
                <div class="stat-info">
                    <h3 id="messageCount">0</h3>
                    <p>Messages</p>
                </div>
            </div>
        </div>

        <div class="chart-card">
            <h3>Orders (Last 7 Days)</h3>
            <div class="bar-chart" id="ordersChart"></div>
        </div>

        <div class="two-col">
            <div class="card">
                <h2>Quick Actions</h2>
                <div class="quick-actions">
                    <a href="products.html" class="action-btn"><i class="fas fa-plus"></i> Manage Products</a>
                    <a href="services.html" class="action-btn secondary"><i class="fas fa-edit"></i> Edit Services</a>
                    <a href="orders.html" class="action-btn warning"><i class="fas fa-eye"></i> View Orders</a>
                    <a href="contacts.html" class="action-btn" style="border-color:rgba(239,68,68,0.3);"><i class="fas fa-envelope"></i> Messages</a>
                </div>
            </div>
            <div class="card">
                <h2>Recent Activity</h2>
                <div id="activityLog" style="max-height:200px;overflow-y:auto;"></div>
            </div>
        </div>
    </main>

    <script src="../assets/js/admin.js"></script>
    <script>
        // Check authentication
        if (!localStorage.getItem('admin_logged_in')) {
            window.location.href = 'index.html';
        }
        
        // Load dashboard data from localStorage
        function loadDashboard() {
            try {
                const products = JSON.parse(localStorage.getItem('transparentdb_products')) || [];
                const services = JSON.parse(localStorage.getItem('transparentdb_services')) || [];
                const contacts = JSON.parse(localStorage.getItem('transparentdb_contacts')) || [];
                document.getElementById('productCount').textContent = products.length;
                document.getElementById('serviceCount').textContent = services.length;
                const unread = contacts.filter(c => !c.read).length;
                document.getElementById('messageCount').textContent = unread + '/' + contacts.length;
            } catch(e) {
                document.getElementById('productCount').textContent = '0';
                document.getElementById('serviceCount').textContent = '0';
                document.getElementById('messageCount').textContent = '0';
            }
        }
        updateBadge();

        function updateBadge() {
            try {
                const contacts = JSON.parse(localStorage.getItem('transparentdb_contacts')) || [];
                const unread = contacts.filter(c => !c.read).length;
                const badge = document.getElementById('msgBadge');
                if (badge) { badge.textContent = unread; badge.style.display = unread > 0 ? 'inline' : 'none'; }
            } catch(e) {}
        }

        function logActivity(msg) {
            const logs = JSON.parse(localStorage.getItem('transparentdb_activity') || '[]');
            logs.unshift({msg, time: new Date().toISOString()});
            if (logs.length > 100) logs.length = 100;
            localStorage.setItem('transparentdb_activity', JSON.stringify(logs));
        }

        function logout() {
            localStorage.removeItem('admin_logged_in');
            window.location.href = 'index.html';
        }
        
        // Set background dynamically
        document.body.style.background = `
            linear-gradient(135deg, rgba(9,9,11,0.8), rgba(9,9,11,0.9)),
            url('../../images/Background.png') center/cover fixed
        `;
    </script>
</body>
</html>
