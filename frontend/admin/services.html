<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services - Admin</title>
    <link rel="stylesheet" href="../assets/css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">

</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header"><i class="fas fa-wind"></i><h2>ANSH ADMIN</h2></div>
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="products.html" class="nav-link"><i class="fas fa-box"></i> Products</a>
            <a href="services.html" class="nav-link active"><i class="fas fa-tools"></i> Services</a>
            <a href="orders.html" class="nav-link"><i class="fas fa-shopping-cart"></i> Orders</a>
            <a href="contacts.html" class="nav-link"><i class="fas fa-envelope"></i> Messages</a>
            <a href="settings.html" class="nav-link"><i class="fas fa-cog"></i> Settings</a>
            <a href="../../index.html" class="nav-link" target="_blank"><i class="fas fa-external-link-alt"></i> Website</a>
            <a href="#" class="nav-link logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
    </aside>

    <main class="main">
        <header class="topbar">
            <h1>Services Management</h1>
            <button class="btn" onclick="openModal('add')"><i class="fas fa-plus"></i> Add Service</button>
        </header>

        <div class="card">
            <div class="inline-flex" style="gap:1rem;margin-bottom:1rem;flex-wrap:wrap;">
                <div class="form-group" style="max-width:400px;margin:0;">
                    <input type="text" id="serviceSearch" class="search-input" placeholder="Search services..." oninput="renderServices()">
                </div>
                <button onclick="openModal('add')" class="btn-sm add"><i class="fas fa-plus"></i> Add Service</button>
                <button onclick="exportServices()" class="btn-sm view" title="Export to CSV"><i class="fas fa-file-csv"></i> Export CSV</button>
            </div>
            <div class="bulk-bar" id="bulkBar">
                <span class="bulk-count">0 selected</span>
                <button class="btn-sm delete" onclick="bulkDeleteServices()"><i class="fas fa-trash"></i> Delete Selected</button>
                <button class="btn-sm cancel" onclick="clearSelection()" style="background:rgba(255,255,255,0.1);color:var(--text-primary);"><i class="fas fa-times"></i> Clear</button>
            </div>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th style="width:40px;"><input type="checkbox" class="select-all" onchange="toggleSelectAll(this,document.querySelectorAll('.select-item'))"></th>
                            <th class="sortable" data-sort="image" onclick="sortServices('image')">Image <i class="fas fa-sort sort-icon"></i></th>
                            <th class="sortable" data-sort="title" onclick="sortServices('title')">Title <i class="fas fa-sort sort-icon"></i></th>
                            <th class="sortable" data-sort="description" onclick="sortServices('description')">Description <i class="fas fa-sort sort-icon"></i></th>
                            <th class="sortable" data-sort="order" onclick="sortServices('order')">Order <i class="fas fa-sort sort-icon"></i></th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="servicesTable"></tbody>
                </table>
            </div>
            <div class="pagination" id="servicesPagination"></div>
        </div>
    </main>

    <!-- Service Modal -->
    <div id="serviceModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Service</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="serviceForm">
                <input type="hidden" id="serviceId">
                <div class="form-row">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="title" required>
                    </div>
                    <div class="form-group">
                        <label>Order</label>
                        <input type="number" id="order" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="desc" rows="3" required></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Image</label>
                        <input type="file" id="imageFile" accept="image/*" onchange="previewServiceImage(this)">
                        <input type="hidden" id="image">
                        <img id="serviceImagePreview" class="img-preview" src="">
                        <small style="color:var(--text-muted);display:block;margin-top:0.3rem;">Or filename: <input type="text" id="imageFilename" placeholder="images/ac-installation.jpg" oninput="document.getElementById('image').value=this.value" style="background:transparent;border:1px solid var(--border);border-radius:4px;padding:0.2rem 0.5rem;color:var(--text-primary);font-size:0.8rem;width:200px;"></small>
                    </div>
                    <div class="form-group">
                        <label>Icon class</label>
                        <input type="text" id="icon" placeholder="e.g. fa-screwdriver-wrench" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Features (comma separated)</label>
                    <input type="text" id="features" placeholder="e.g. Expert Technicians, All Brands, Same Day">
                </div>
                <button type="submit" class="btn"><i class="fas fa-save"></i> Save</button>
            </form>
        </div>
    </div>

    <script src="../assets/js/admin.js"></script>
    <script>
        if (!localStorage.getItem('admin_logged_in')) window.location.href = 'index.html';

        const DEFAULT_SERVICES = [
            {id:1, title:'AC Installation', description:'Professional setup for Split, Window & Cassette ACs with zero damage guarantee and free demo.', image:'images/ac-installation.jpg', icon:'fa-screwdriver-wrench', features:['Expert Technicians','All Brands Supported','Same Day Service'], order:1},
            {id:2, title:'AC Cleaning & Service', description:'Deep cleaning with anti-bacterial foam wash for better cooling and healthy air quality.', image:'images/ac-cleaning.jpg', icon:'fa-broom', features:['Foam Wash Technology','Filter Deep Cleaning','Anti-Bacterial Treatment'], order:2},
            {id:3, title:'Gas Refill & Charging', description:'R410A & R32 gas refill with leak detection and pressure testing for optimal cooling.', image:'images/gas-refill.jpg', icon:'fa-snowflake', features:['Genuine Gas Only','Leak Detection','Pressure Testing'], order:3},
            {id:4, title:'AC Repair & Service', description:'Same-day repair for all AC brands with genuine spare parts and service warranty.', image:'images/ac-repair.jpg', icon:'fa-wrench', features:['All Brands Repaired','Genuine Spare Parts','30-Day Warranty'], order:4},
            {id:5, title:'Annual Maintenance (AMC)', description:'Yearly AMC plans with unlimited servicing, priority support & 20% discount on repairs.', image:'images/amc-service.jpg', icon:'fa-clipboard-check', features:['Unlimited Service Calls','Priority Support','20% Discount on Repairs'], order:5},
            {id:6, title:'PCB Repair & Service', description:'Advanced PCB level repair for inverter ACs with component replacement and testing.', image:'images/pcb-repair.jpg', icon:'fa-microchip', features:['Component Level Repair','Inverter AC Specialist','90-Day Warranty'], order:6}
        ];

        let services = [];
        let servicesPage = 1;
        let serviceSortField = 'order';
        let serviceSortDir = 1;
        const PER_PAGE = 10;

        function loadData() {
            const saved = localStorage.getItem('transparentdb_services');
            if (saved) {
                try { services = JSON.parse(saved); } catch(e) { services = []; }
            }
            if (!services || services.length === 0) {
                services = JSON.parse(JSON.stringify(DEFAULT_SERVICES));
                saveData();
            }
            renderServices();
            initModalOverlay('serviceModal');
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
        }

        function saveData() {
            localStorage.setItem('transparentdb_services', JSON.stringify(services));
            if (typeof logActivity === 'function') logActivity('Services updated (' + services.length + ' items)');
        }

        function sortServices(field) {
            if (serviceSortField === field) { serviceSortDir *= -1; } else { serviceSortField = field; serviceSortDir = 1; }
            const headers = document.querySelectorAll('.sortable');
            headers.forEach(h => h.classList.remove('active-sort'));
            const active = document.querySelector('.sortable[data-sort="' + field + '"]');
            if (active) active.classList.add('active-sort');
            services.sort((a, b) => {
                let va = a[field], vb = b[field];
                if (typeof va === 'string') va = va.toLowerCase();
                if (typeof vb === 'string') vb = vb.toLowerCase();
                if (va < vb) return -1 * serviceSortDir;
                if (va > vb) return 1 * serviceSortDir;
                return 0;
            });
            renderServices();
        }

        function renderServices() {
            const tbody = document.getElementById('servicesTable');
            const search = (document.getElementById('serviceSearch')?.value || '').toLowerCase();
            let filtered = search ? services.filter(s => s.title.toLowerCase().includes(search)) : services;

            const totalPages = Math.ceil(filtered.length / PER_PAGE) || 1;
            if (servicesPage > totalPages) servicesPage = totalPages;
            const start = (servicesPage - 1) * PER_PAGE;
            const pageItems = filtered.slice(start, start + PER_PAGE);

            if (!pageItems.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><div class="empty-state-icon"><i class="fas fa-tools"></i></div>No services found.</td></tr>';
                document.getElementById('servicesPagination').innerHTML = '';
                updateBulkBar();
                return;
            }

            tbody.innerHTML = pageItems.map(s => `
                <tr>
                    <td><input type="checkbox" class="select-item" value="${s.id}" onchange="updateBulkBar()"></td>
                    <td><img src="../../${s.image}" class="thumb" onerror="this.src='../../images/split-ac.jpg'"></td>
                    <td>${s.title}</td>
                    <td>${s.description}</td>
                    <td>${s.order}</td>
                    <td>
                        <button class="btn-sm edit" onclick="openModal('edit',${s.id})" title="Edit"><i class="fas fa-edit"></i></button>
                        <button class="btn-sm delete" onclick="confirmAction('Delete service "' + '${s.title.replace(/'/g, "\\'")}' + '"?',()=>deleteService(${s.id}))" title="Delete"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
            document.getElementById('servicesPagination').innerHTML = paginationHTML(totalPages, servicesPage, 'goServicesPage');
            updateBulkBar();
        }

        function goServicesPage(p) { servicesPage = p; renderServices(); }

        function clearSelection() {
            document.querySelectorAll('.select-item, .select-all').forEach(cb => cb.checked = false);
            updateBulkBar();
        }

        function bulkDeleteServices() {
            const ids = getSelectedIds();
            if (!ids.length) return;
            confirmAction('Delete ' + ids.length + ' selected services?', () => {
                services = services.filter(s => !ids.includes(s.id));
                saveData();
                renderServices();
                showToast(ids.length + ' service(s) deleted');
            });
        }

        function exportServices() {
            const search = (document.getElementById('serviceSearch')?.value || '').toLowerCase();
            let filtered = search ? services.filter(s => s.title.toLowerCase().includes(search)) : services;
            if (!filtered.length) { showToast('No services to export.', 'warning'); return; }
            const headers = ['Title','Description','Order','Icon'];
            const rows = filtered.map(s => [s.title, s.description, s.order, s.icon || '']);
            downloadCSV(headers, rows, 'services-export.csv');
            showToast('Exported ' + filtered.length + ' services');
        }

        function previewServiceImage(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('serviceImagePreview');
                img.src = e.target.result;
                img.style.display = 'block';
                document.getElementById('image').value = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function openModal(mode, id) {
            const modal = document.getElementById('serviceModal');
            modal.style.display = 'flex';
            document.getElementById('serviceImagePreview').style.display = 'none';
            document.getElementById('imageFile').value = '';
            if (mode === 'add') {
                document.getElementById('modalTitle').textContent = 'Add Service';
                document.getElementById('serviceForm').reset();
                document.getElementById('serviceId').value = '';
                document.getElementById('order').value = services.length + 1;
                document.getElementById('image').value = '';
                document.getElementById('imageFilename').value = '';
            } else {
                document.getElementById('modalTitle').textContent = 'Edit Service';
                const s = services.find(x => x.id === id);
                if (!s) return;
                document.getElementById('serviceId').value = s.id;
                document.getElementById('title').value = s.title;
                document.getElementById('desc').value = s.description;
                document.getElementById('order').value = s.order;
                document.getElementById('icon').value = s.icon || '';
                document.getElementById('features').value = (s.features || []).join(', ');
                document.getElementById('image').value = s.image || '';
                document.getElementById('imageFilename').value = s.image || '';
                if (s.image && s.image.startsWith('data:')) {
                    document.getElementById('serviceImagePreview').src = s.image;
                    document.getElementById('serviceImagePreview').style.display = 'block';
                }
            }
        }

        function closeModal() {
            document.getElementById('serviceModal').style.display = 'none';
        }

        document.getElementById('serviceForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('serviceId').value;
            let image = document.getElementById('image').value;
            if (!image) image = document.getElementById('imageFilename').value || 'images/split-ac.jpg';
            const data = {
                title: document.getElementById('title').value,
                description: document.getElementById('desc').value,
                order: parseInt(document.getElementById('order').value),
                image: image,
                icon: document.getElementById('icon').value,
                features: document.getElementById('features').value.split(',').map(f => f.trim()).filter(Boolean)
            };
            if (id) {
                const idx = services.findIndex(s => s.id === parseInt(id));
                if (idx !== -1) { services[idx] = { ...services[idx], ...data }; }
                showToast('Service updated successfully');
            } else {
                data.id = Date.now();
                services.push(data);
                showToast('Service added successfully');
            }
            saveData();
            renderServices();
            closeModal();
        });

        function deleteService(id) {
            services = services.filter(s => s.id !== id);
            saveData();
            renderServices();
            showToast('Service deleted');
        }

        function logout() { localStorage.removeItem('admin_logged_in'); window.location.href = 'index.html'; }

        document.body.style.background = 'linear-gradient(135deg, rgba(9,9,11,0.8), rgba(9,9,11,0.9)), url(\'../../images/Background.png\') center/cover fixed';

        loadData();
    </script>
</body>
</html>
